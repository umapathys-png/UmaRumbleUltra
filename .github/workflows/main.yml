name: Crypto Scalper 24/7

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Updated to satisfy alpaca-py requirements

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py aiohttp
          pip install pandas-ta --no-dependencies 
          pip install pandas numpy # Ensure core dependencies for pandas-ta are present

      - name: Run Scalper Cycle
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python Think_Profit.py

      - name: Save Trade Log for Excel
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: trade-data-history
          path: trade_log.csv
