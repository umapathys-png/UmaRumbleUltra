name: Crypto Scalper 24/7

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install alpaca-py pandas-ta aiohttp
      - name: Install Dependencies
        run: pip install alpaca-py pandas-ta aiohttp pytz requests

      - name: Run Scalper Cycle
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python Think_Profit.py

      - name: Save Trade Log for Excel
        if: always() # Runs even if the python script fails
        uses: actions/upload-artifact@v4
        with:
          name: trade-data-history
          path: trade_log.csv
