name: Ad-hoc Account Clear

on:
  workflow_dispatch: # This allows you to click a button to run it

jobs:
  clear-account:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Clear Script
        env:
          API_KEY: ${{ secrets.ALPACA_API_KEY }}
          SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        # We use a non-interactive version for GitHub Actions
        run: |
          python -c "
          import requests, os
          headers = {'APCA-API-KEY-ID': os.getenv('API_KEY'), 'APCA-API-SECRET-KEY': os.getenv('SECRET_KEY')}
          requests.delete('https://paper-api.alpaca.markets/v2/orders', headers=headers)
          requests.delete('https://paper-api.alpaca.markets/v2/positions', headers=headers)
          print('Account Cleared Successfully')
          "
