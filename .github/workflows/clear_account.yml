name: Ad-hoc Clear Paper Trades

on:
  workflow_dispatch: # This creates the "Run workflow" button in GitHub

jobs:
  clear-account:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Orders and Positions
        env:
          API_KEY: ${{ secrets.ALPACA_API_KEY }}
          SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          # 1. Cancel all open (unfilled) orders
          curl -X DELETE "https://paper-api.alpaca.markets/v2/orders" \
            -H "APCA-API-KEY-ID: $API_KEY" \
            -H "APCA-API-SECRET-KEY: $SECRET_KEY"
          
          # 2. Liquidate all open positions (Sell everything you currently hold)
          curl -X DELETE "https://paper-api.alpaca.markets/v2/positions" \
            -H "APCA-API-KEY-ID: $API_KEY" \
            -H "APCA-API-SECRET-KEY: $SECRET_KEY"
          
          echo "✅ Active trades and orders cleared."
